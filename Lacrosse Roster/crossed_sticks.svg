<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="shaft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7C414"/>
      <stop offset="100%" style="stop-color:#D4A30E"/>
    </linearGradient>
  </defs>
  <!-- Left stick (angled from bottom-left to top-right) -->
  <g transform="rotate(-35, 100, 100)">
    <!-- Shaft -->
    <rect x="95" y="45" width="10" height="150" rx="4" fill="url(#shaft)" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Head frame -->
    <ellipse cx="100" cy="42" rx="22" ry="32" fill="none" stroke="#F7C414" stroke-width="4"/>
    <ellipse cx="100" cy="42" rx="22" ry="32" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Mesh/pocket lines -->
    <line x1="84" y1="30" x2="116" y2="30" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
    <line x1="82" y1="40" x2="118" y2="40" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
    <line x1="84" y1="50" x2="116" y2="50" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
    <line x1="90" y1="14" x2="88" y2="60" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
    <line x1="100" y1="10" x2="100" y2="62" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
    <line x1="110" y1="14" x2="112" y2="60" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
  </g>
  <!-- Right stick (angled from bottom-right to top-left) -->
  <g transform="rotate(35, 100, 100)">
    <!-- Shaft -->
    <rect x="95" y="45" width="10" height="150" rx="4" fill="url(#shaft)" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Head frame -->
    <ellipse cx="100" cy="42" rx="22" ry="32" fill="none" stroke="#F7C414" stroke-width="4"/>
    <ellipse cx="100" cy="42" rx="22" ry="32" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Mesh/pocket lines -->
    <line x1="84" y1="30" x2="116" y2="30" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
    <line x1="82" y1="40" x2="118" y2="40" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
    <line x1="84" y1="50" x2="116" y2="50" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
    <line x1="90" y1="14" x2="88" y2="60" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
    <line x1="100" y1="10" x2="100" y2="62" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
    <line x1="110" y1="14" x2="112" y2="60" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
  </g>
</svg>